<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG Point — каталог игровой периферии</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🔥 ОСНОВНЫЕ СТИЛИ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-blue: #2563eb;
            --primary-dark: #1e40af;
            --accent-teal: #0d9488;
            --accent-purple: #7c3aed;
            --accent-pink: #db2777;
            --sale-red: #ef4444;
            --sale-orange: #f97316;
            --discount-pink: #db2777;
            --hot-gradient: linear-gradient(135deg, #ff6b00 0%, #ff0000 100%);
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --text-gray: #cbd5e1;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --sale-gradient: linear-gradient(135deg, #f97316 0%, #ef4444 100%);
            --discount-gradient: linear-gradient(135deg, #db2777 0%, #7c3aed 100%);
            --success-green: #10b981;
            --warning-yellow: #f59e0b;
            --feedback-blue: #3b82f6;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* 🔥 Улучшенный хедер */
        header {
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(15px);
            padding: 1rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary-blue);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.25);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            gap: 2rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }

        .logo a {
            text-decoration: none;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Навигация */
        .nav-list {
            display: flex;
            list-style: none;
            gap: 1rem;
            margin: 0;
            padding: 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            color: var(--text-light);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-link:hover {
            color: var(--primary-blue);
            background: rgba(37, 99, 235, 0.1);
            transform: translateY(-1px);
        }

        .nav-link i {
            font-size: 1.1rem;
        }

        .nav-text {
            display: inline;
        }

        /* Кнопка админа */
        .admin-btn {
            background: rgba(37, 99, 235, 0.15);
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .admin-btn:hover {
            background: var(--primary-blue);
            color: var(--text-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        /* Кнопка фидбека */
        .feedback-btn {
            background: rgba(59, 130, 246, 0.15);
            border: 2px solid var(--feedback-blue);
            color: var(--feedback-blue);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .feedback-btn:hover {
            background: var(--feedback-blue);
            color: var(--text-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* 🎯 Улучшенный герой-баннер */
        .hero {
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1e293b 100%);
            padding: 0 2rem;
            margin-top: 80px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000"><polygon fill="%232563eb" fill-opacity="0.05" points="0,1000 1000,0 1000,1000"/></svg>');
            background-size: cover;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .hero-content p {
            font-size: 1.3rem;
            margin-bottom: 2.5rem;
            color: var(--text-gray);
            max-width: 700px;
            line-height: 1.6;
        }

        .cta-button {
            background: var(--gradient);
            color: var(--text-light);
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        /* 🎯 СЕКЦИЯ - СКИДОЧНЫЕ ТОВАРЫ */
        .hot-prices-section {
            padding: 5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .hot-prices-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.1) 0%, rgba(255, 0, 0, 0.1) 100%);
            border-radius: 20px;
            z-index: -1;
        }

        .hot-prices-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .hot-prices-title {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .hot-prices-title h2 {
            font-size: 3rem;
            background: var(--hot-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        .hot-prices-title h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100px;
            height: 4px;
            background: var(--hot-gradient);
            border-radius: 2px;
        }

        .hot-prices-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: rgba(255, 107, 0, 0.15);
            border-radius: 12px;
            border: 2px solid rgba(255, 107, 0, 0.3);
        }

        .hot-prices-info i {
            font-size: 1.5rem;
            color: #ff6b00;
        }

        .hot-prices-info span {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-light);
        }

        .hot-badge {
            background: var(--hot-gradient);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.2rem;
            box-shadow: 0 5px 20px rgba(255, 107, 0, 0.3);
        }

        .hot-badge i {
            font-size: 1.5rem;
            animation: fireAnimation 1.5s infinite alternate;
        }

        @keyframes fireAnimation {
            0% { transform: scale(1); color: #ff6b00; }
            100% { transform: scale(1.1); color: #ff0000; }
        }

        .hot-prices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .hot-price-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .hot-price-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border-color: #ff6b00;
        }

        .hot-price-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--hot-gradient);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 3px 10px rgba(255, 107, 0, 0.3);
        }

        .admin-hot-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--primary-blue);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            transition: all 0.3s ease;
            border: 2px solid white;
        }

        .admin-hot-badge:hover {
            background: var(--primary-dark);
            transform: scale(1.1);
        }

        .admin-hot-badge i {
            font-size: 1rem;
        }

        .hot-price-image-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            background: rgba(0, 0, 0, 0.2);
        }

        .hot-price-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
            padding: 1rem;
            cursor: pointer;
            background: white;
            border-radius: 8px;
        }

        .hot-price-card:hover .hot-price-image {
            transform: scale(1.05);
        }

        .hot-price-info {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .hot-price-name {
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
            color: var(--text-light);
            line-height: 1.4;
            font-weight: 600;
        }

        .hot-price-category {
            font-size: 0.9rem;
            color: #ff6b00;
            background: rgba(255, 107, 0, 0.1);
            padding: 0.3rem 1rem;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .hot-price-description {
            color: var(--text-gray);
            margin-bottom: 1rem;
            line-height: 1.5;
            font-size: 0.95rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .hot-price-prices {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .old-price {
            font-size: 1.1rem;
            color: var(--text-gray);
            text-decoration: line-through;
        }

        .new-price {
            font-size: 1.6rem;
            color: var(--sale-red);
            font-weight: bold;
        }

        .discount-percent {
            font-size: 1rem;
            color: var(--discount-pink);
            background: rgba(219, 39, 119, 0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 10px;
            font-weight: bold;
        }

        /* 🎯 Секция категорий */
        .categories {
            padding: 5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .category-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            transition: all 0.4s ease;
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .category-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-blue);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--gradient);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .category-card:hover::before {
            transform: scaleX(1);
        }

        .category-icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .category-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.8rem;
            color: var(--text-light);
        }

        .category-count {
            color: var(--text-gray);
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            display: inline-block;
        }

        /* 🏷️ Секция брендов */
        .brands-section {
            padding: 5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.3);
            border-radius: 20px;
            margin-top: 2rem;
        }

        .brands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .brand-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2rem 1rem;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .brand-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-blue);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .brand-card.active {
            border-color: var(--accent-teal);
            background: rgba(13, 148, 136, 0.1);
        }

        .brand-card.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent-teal);
        }

        .brand-logo {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-logo img {
            max-width: 100%;
            max-height: 50px;
            filter: brightness(0) invert(1);
            transition: all 0.3s ease;
            object-fit: contain;
        }

        .brand-card:hover .brand-logo img {
            filter: brightness(0) invert(0.7) sepia(1) saturate(5) hue-rotate(200deg);
        }

        .brand-card.active .brand-logo img {
            filter: brightness(0) invert(0.7) sepia(1) saturate(5) hue-rotate(160deg);
        }

        .brand-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-light);
        }

        /* 🎪 Секция товаров */
        .products {
            padding: 5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 3rem;
            position: relative;
            color: var(--text-light);
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 4px;
            background: var(--gradient);
            border-radius: 2px;
        }

        /* 🎯 Улучшенные фильтры */
        .filters-section {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            border: 1px solid #334155;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 600;
        }

        .filter-select, .filter-input {
            background: var(--dark-bg);
            border: 2px solid #334155;
            border-radius: 10px;
            padding: 0.8rem 1rem;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .filter-input::placeholder {
            color: #64748b;
        }

        .products-count {
            color: var(--text-light);
            margin-bottom: 2rem;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* 🎨 Улучшенные карточки товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 2px solid #334155;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border-color: var(--primary-blue);
        }

        .product-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--gradient);
            color: white;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            z-index: 2;
        }

        .product-image-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            background: rgba(0, 0, 0, 0.2);
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
            cursor: pointer;
            background: white;
            border-radius: 8px;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-info {
            padding: 1.8rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
            color: var(--text-light);
            line-height: 1.4;
            font-weight: 600;
        }

        .product-category {
            font-size: 0.9rem;
            color: var(--primary-blue);
            background: rgba(37, 99, 235, 0.1);
            padding: 0.3rem 1rem;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .product-description-short {
            color: var(--text-gray);
            margin-bottom: 1rem;
            line-height: 1.5;
            font-size: 0.95rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .product-price {
            font-size: 1.6rem;
            color: var(--accent-teal);
            font-weight: bold;
            margin-bottom: 1rem;
        }

        /* 📞 Футер */
        footer {
            background: var(--card-bg);
            padding: 4rem 2rem;
            border-top: 2px solid var(--primary-blue);
            margin-top: 4rem;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
        }

        .footer-section h3 {
            color: var(--primary-blue);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--text-gray);
            font-size: 1.1rem;
        }

        /* 🎪 Улучшенные модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-content {
            position: relative;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2.5rem;
            margin: 2rem auto;
            max-width: 1200px;
            width: 95%;
            border: 2px solid var(--primary-blue);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-gray);
