<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Нет соединения - GGPoint</title>
    <meta name="description" content="Нет подключения к интернету. Проверьте соединение и попробуйте снова.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .offline-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 32px;
            border: 1px solid rgba(37, 99, 235, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 24px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .offline-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        
        .offline-text {
            color: #94a3b8;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .retry-btn {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(37, 99, 235, 0.4);
        }
        
        .saved-pages {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(37, 99, 235, 0.2);
        }
        
        .saved-title {
            font-size: 0.9rem;
            color: #60a5fa;
            margin-bottom: 16px;
        }
        
        .saved-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        
        .saved-links a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 6px 16px;
            background: rgba(37, 99, 235, 0.1);
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        
        .saved-links a:hover {
            background: rgba(37, 99, 235, 0.3);
            color: white;
        }
        
        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 16px;
            transition: all 0.3s ease;
        }
        
        .home-link:hover {
            color: #2563eb;
        }
        
        @media (max-width: 550px) {
            .offline-card {
                padding: 32px 20px;
            }
            .offline-title {
                font-size: 1.5rem;
            }
            .offline-icon {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-card">
            <div class="offline-icon">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 9L5 12L8 15" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M16 9L19 12L16 15" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 5L12 19" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="12" cy="12" r="9" stroke="#60a5fa" stroke-width="2"/>
                </svg>
            </div>
            <h1 class="offline-title">Нет соединения</h1>
            <p class="offline-text">Проверьте подключение к интернету и попробуйте снова. Некоторые страницы могут быть доступны офлайн.</p>
            
            <button class="retry-btn" onclick="location.reload()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                Обновить страницу
            </button>
            
            <div class="saved-pages">
                <div class="saved-title">📁 Доступные страницы офлайн</div>
                <div class="saved-links">
                    <a href="index.html">Главная</a>
                    <a href="catalog.html">Каталог</a>
                    <a href="about.html">О нас</a>
                    <a href="contacts.html">Контакты</a>
                </div>
            </div>
            
            <a href="index.html" class="home-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H4a2 2 0 0 1-2-2z"/>
                </svg>
                Вернуться на главную
            </a>
        </div>
    </div>
    
    <script>
        // Обработчик онлайн/офлайн событий
        window.addEventListener('online', () => {
            location.reload();
        });
    </script>
</body>
</html>
