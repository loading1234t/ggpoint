<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO -->
    <title>Товар - GGPoint</title>
    <meta name="description" content="Подробное описание товара">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Стили для страницы товара */
        .product-page {
            padding: 6rem 2rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }
        
        /* Кнопка назад */
        .back-button {
            position: absolute;
            top: 6rem;
            left: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            background: var(--card-bg);
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }
        
        .back-button:hover {
            background: var(--primary-blue);
            color: white;
            transform: translateX(-5px);
        }
        
        .close-button {
            position: absolute;
            top: 6rem;
            right: 2rem;
            width: 40px;
            height: 40px;
            background: var(--card-bg);
            border: 2px solid var(--sale-red);
            color: var(--sale-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
            font-size: 1.2rem;
        }
        
        .close-button:hover {
            background: var(--sale-red);
            color: white;
            transform: scale(1.1);
        }
        
        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin-top: 2rem;
        }
        
        .product-gallery {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 2px solid #334155;
        }
        
        .main-image-container {
            position: relative;
            width: 100%;
            height: 500px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
            cursor: zoom-in;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        
        .main-image.zoomed {
            transform: scale(2);
            cursor: zoom-out;
        }
        
        .zoom-hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .gallery-nav {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 1rem;
            pointer-events: none;
        }
        
        .gallery-btn {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.7);
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            pointer-events: all;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .gallery-btn:hover {
            background: var(--primary-blue);
            transform: scale(1.1);
        }
        
        .gallery-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .thumbnail {
            width: 100%;
            height: 80px;
            object-fit: contain;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            padding: 0.2rem;
        }
        
        .thumbnail:hover {
            transform: translateY(-2px);
            border-color: var(--primary-blue);
        }
        
        .thumbnail.active {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3);
        }
        
        .photo-count {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(37, 99, 235, 0.1);
            border-radius: 8px;
            color: var(--text-gray);
        }
        
        .fullscreen-btn {
            background: transparent;
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .fullscreen-btn:hover {
            background: var(--primary-blue);
            color: white;
        }
        
        .product-info {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            border: 2px solid #334155;
        }
        
        .product-badge.sale {
            background: var(--hot-gradient);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 1rem;
        }
        
        .product-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }
        
        .product-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .product-category {
            color: var(--primary-blue);
            background: rgba(37, 99, 235, 0.1);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .product-brand {
            color: var(--text-gray);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .product-brand img {
            height: 25px;
            filter: brightness(0) invert(1);
        }
        
        .product-price-block {
            background: linear-gradient(135deg, rgba(37,99,235,0.1) 0%, rgba(124,58,237,0.1) 100%);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 2px solid var(--primary-blue);
        }
        
        .current-price {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-blue);
        }
        
        .old-price {
            font-size: 1.3rem;
            color: var(--text-gray);
            text-decoration: line-through;
            margin-left: 1rem;
        }
        
        .discount-info {
            background: var(--hot-gradient);
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-left: 1rem;
        }
        
        .product-description {
            margin-bottom: 2rem;
            color: var(--text-gray);
            line-height: 1.7;
        }
        
        .product-features h3 {
            color: var(--text-light);
            margin-bottom: 1rem;
        }
        
        .features-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
        }
        
        .features-list li {
            color: var(--text-gray);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .features-list li::before {
            content: '✓';
            color: var(--success-green);
            font-weight: bold;
        }
        
        .product-actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .action-btn {
            flex: 1;
            padding: 1rem;
            border: 2px solid;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .action-btn.primary {
            background: var(--gradient);
            border-color: transparent;
            color: white;
        }
        
        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }
        
        .action-btn.secondary {
            background: transparent;
            border-color: var(--primary-blue);
            color: var(--primary-blue);
        }
        
        .action-btn.secondary:hover {
            background: var(--primary-blue);
            color: white;
        }
        
        .youtube-section-bottom {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            border: 2px solid var(--primary-blue);
            margin: 2rem 0;
        }
        
        .youtube-header-bottom {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .youtube-icon-large {
            width: 60px;
            height: 60px;
            background: #ff0000;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }
        
        .youtube-title h3 {
            color: var(--text-light);
            font-size: 1.8rem;
        }
        
        .youtube-title p {
            color: var(--text-gray);
        }
        
        .youtube-badge {
            background: rgba(255,0,0,0.1);
            color: #ff0000;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            border: 2px solid #ff0000;
        }
        
        .video-container-bottom {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #ff0000;
        }
        
        .video-container-bottom iframe {
            width: 100%;
            height: 450px;
            border: none;
        }
        
        .no-video-bottom {
            text-align: center;
            padding: 4rem;
            background: linear-gradient(135deg, rgba(255,0,0,0.05), rgba(0,0,0,0.2));
            border-radius: 16px;
            color: var(--text-gray);
            border: 2px dashed #ff0000;
        }
        
        .no-video-bottom i {
            font-size: 5rem;
            color: #ff0000;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .watch-on-youtube {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 2rem;
            background: #ff0000;
            color: white;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 1rem;
        }
        
        .product-tabs {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            border: 2px solid #334155;
            margin: 2rem 0;
        }
        
        .tabs-header {
            display: flex;
            gap: 1rem;
            border-bottom: 2px solid #334155;
            margin-bottom: 2rem;
        }
        
        .tab-btn {
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            color: var(--text-gray);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary-blue);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        
        .tab-btn:hover {
            color: var(--primary-blue);
        }
        
        .tab-btn.active {
            color: var(--primary-blue);
        }
        
        .tab-btn.active::after {
            transform: scaleX(1);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .specs-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .specs-table tr {
            border-bottom: 1px solid #334155;
        }
        
        .specs-table td {
            padding: 1rem;
            color: var(--text-gray);
        }
        
        .specs-table td:first-child {
            font-weight: 600;
            color: var(--text-light);
            width: 200px;
        }
        
        .fullscreen-gallery {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .fullscreen-gallery.active {
            display: flex;
        }
        
        .fullscreen-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3001;
        }
        
        .fullscreen-close:hover {
            background: var(--sale-red);
            transform: scale(1.1);
        }
        
        .fullscreen-nav {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 3001;
        }
        
        .fullscreen-nav-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .fullscreen-nav-btn:hover {
            background: var(--primary-blue);
            transform: scale(1.1);
        }
        
        .fullscreen-counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
        }
        
        .related-products {
            margin-top: 4rem;
        }
        
        .related-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--text-light);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }
        
        .product-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid #334155;
            transition: all 0.3s ease;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-blue);
        }
        
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .product-card .product-info {
            padding: 1rem;
            background: transparent;
            border: none;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success-green);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: 1fr;
            }
            .video-container-bottom iframe {
                height: 250px;
            }
            .features-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="index.html">GGPoint</a>
            </div>
            <nav>
                <ul class="nav-list">
                    <li><a href="index.html">Главная</a></li>

            </div>

    <button class="back-button" onclick="goBack()"><i class="fas fa-arrow-left"></i> Назад</button>
    <button class="close-button" onclick="goBack()"><i class="fas fa-times"></i></button>

    <div class="product-page">
        <div class="product-container">
            <div class="product-gallery">
                <div class="main-image-container" id="mainImageContainer">
                    <img src="" alt="" class="main-image" id="mainImage">
                    <div class="zoom-hint"><i class="fas fa-search-plus"></i><span>Клик для увеличения</span></div>
                    <div class="gallery-nav">
                        <button class="gallery-btn" onclick="changeImage(-1)"><i class="fas fa-chevron-left"></i></button>

                    <button class="action-btn primary" onclick="showComingSoon()"><i class="fas fa-bell"></i> Уведомить</button>
                    <button class="action-btn secondary" onclick="addToFavorites()"><i class="far fa-heart"></i> В избранное</button>
                </div>
            </div>
        </div>
        
        <div class="youtube-section-bottom">
            <div class="youtube-header-bottom">
                <div class="youtube-icon-large"><i class="fab fa-youtube"></i></div>
                <div class="youtube-title">
                    <h3>Видеообзор</h3>
                    <p>Смотрите подробный обзор на YouTube</p>
                </div>
                <div class="youtube-badge"><i class="fas fa-play"></i> Смотреть</div>
            </div>

        <div class="product-tabs">

            <div class="tab-content active" id="tab-desc">

            <div class="tab-content" id="tab-specs">
                <table class="specs-table" id="specsTable"></table>
            </div>

        <div class="related-products">
            <h2 class="related-title">Похожие товары</h2>
            <div class="products-grid" id="relatedProducts"></div>
        </div>
    </div>

    <div class="fullscreen-gallery" id="fullscreenGallery">
        <button class="fullscreen-close" onclick="closeFullscreen()">×</button>
        <div class="fullscreen-nav">
            <button class="fullscreen-nav-btn" onclick="fullscreenChangeImage(-1)"><i class="fas fa-chevron-left"></i></button>
            <button class="fullscreen-nav-btn" onclick="fullscreenChangeImage(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="fullscreen-image-container">
            <img src="" alt="" class="fullscreen-image" id="fullscreenImage" onclick="toggleFullscreenZoom()">

        <div class="fullscreen-counter" id="fullscreenCounter">1 / 1</div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDcyOWAF7TA8h8P36Sk5EbDPzA9sEFuTXo",
            authDomain: "ggpoint-shop.firebaseapp.com",
            databaseURL: "https://ggpoint-shop-default-rtdb.firebaseio.com",
            projectId: "ggpoint-shop",
            storageBucket: "ggpoint-shop.firebasestorage.app",
            messagingSenderId: "182227173652",
            appId: "1:182227173652:web:0949e2edae9900afd98201"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        if (!productId) window.location.href = 'catalog.html';

        let product = null;
        let products = [];
        let hotPrices = {};
        let brands = {};
        let images = [];
        let currentImageIndex = 0;

        function getYouTubeId(url) {
            if (!url) return null;
            if (url.length === 11 && /^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?/]+)/,
                /youtube\.com\/watch\?.*v=([^&]+)/,
                /youtu\.be\/([^?]+)/
            ];
            for (let p of patterns) {
                const m = url.match(p);
                if (m) return m[1];
            }
            return null;
        }

        function renderYouTubeVideo() {
            const container = document.getElementById('videoContainerBottom');
            if (!product?.video) {
                container.innerHTML = '<div class="no-video-bottom"><i class="fab fa-youtube"></i><h4>Видеообзор скоро появится</h4><p>Мы готовим подробный обзор этого товара</p></div>';
                return;
            }
            const videoId = getYouTubeId(product.video);
            if (videoId) {
                container.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `<div class="no-video-bottom"><i class="fab fa-youtube"></i><h4>Видео доступно на YouTube</h4><a href="${product.video}" target="_blank" class="watch-on-youtube"><i class="fab fa-youtube"></i> Смотреть</a></div>`;
            }
        }

        function renderProduct() {
            if (!product) return;
            
            images = product.images || ['https://via.placeholder.com/500x400?text=Нет+фото'];
            
            document.getElementById('productTitle').textContent = product.name;
            document.getElementById('productCategory').textContent = getCategoryName(product.category);
            
            const brand = Object.values(brands).find(b => b.name === product.brand);
            if (brand) {
                document.getElementById('productBrand').innerHTML = `<img src="${brand.icon}"><span>${product.brand}</span>`;
            }
            
            document.getElementById('productPrice').textContent = product.price;
            
            if (hotPrices[productId]) {
                document.getElementById('saleBadge').innerHTML = '<span class="product-badge sale"><i class="fas fa-fire"></i> Скидка!</span>';
                const oldPrice = parseInt(product.price.replace(/\D/g,'')) || 0;
                document.getElementById('oldPrice').style.display = 'inline';
                document.getElementById('oldPrice').textContent = Math.round(oldPrice*1.3).toLocaleString() + ' UZS';
                document.getElementById('discountInfo').style.display = 'inline';
                document.getElementById('discountInfo').textContent = '🔥 -30%';
            }
            
            document.getElementById('productDescription').textContent = product.description.substring(0,200) + '...';
            document.getElementById('fullDescription').textContent = product.description;
            
            if (product.features?.length) {
                document.getElementById('featuresList').innerHTML = product.features.map(f => `<li>${f}</li>`).join('');
            }
            
            renderYouTubeVideo();
            
            document.getElementById('photoCount').textContent = images.length + ' фото';
            document.getElementById('mainImage').src = images[0];
            
            let thumbs = '';
            images.forEach((img, i) => {
                thumbs += `<img src="${img}" class="thumbnail ${i===0?'active':''}" onclick="setImage(${i})">`;
            });
            document.getElementById('thumbnailGrid').innerHTML = thumbs;
        }

        function loadData() {
            onValue(ref(database, 'products/' + productId), (s) => {
                product = s.val();
                if (!product) { window.location.href = 'catalog.html'; return; }
                document.title = product.name;
                renderProduct();
            });
            onValue(ref(database, 'products'), (s) => {
                products = s.val() ? Object.values(s.val()) : [];
                if (!product) return;
                const related = products.filter(p => p.category === product.category && p.id != product.id).slice(0,4);
                let html = '';
                related.forEach(p => {
                    html += `<div class="product-card" onclick="window.location.href='product.html?id=${p.id}'">
                        <img src="${p.images?.[0] || 'https://via.placeholder.com/300x200'}">
                        <div class="product-info"><h3>${p.name}</h3><p>${p.price}</p></div>
                    </div>`;
                });
                document.getElementById('relatedProducts').innerHTML = html;
            });
            onValue(ref(database, 'hotPrices'), (s) => hotPrices = s.val() || {});
            onValue(ref(database, 'brands'), (s) => brands = s.val() || {});
        }

        function getCategoryName(key) {
            const cats = {'мышь':'Мышь','клавиатура':'Клавиатура','наушники':'Наушники','монитор':'Монитор','keycaps':'Кейкапы'};
            return cats[key] || key;
        }

        window.goBack = () => window.location.href = 'catalog.html';
        window.showComingSoon = () => alert('🔔 Скоро появится!');
        window.addToFavorites = () => alert('❤️ Добавлено в избранное');

        window.setImage = (i) => {
            currentImageIndex = i;
            document.getElementById('mainImage').src = images[i];
            document.querySelectorAll('.thumbnail').forEach((t,idx) => t.classList.toggle('active', idx===i));
        };
        window.changeImage = (d) => {
            let i = currentImageIndex + d;
            if (i < 0) i = images.length - 1;
            if (i >= images.length) i = 0;
            setImage(i);
        };

        document.getElementById('mainImageContainer').addEventListener('click', () => {
            document.getElementById('mainImage').classList.toggle('zoomed');
        });

        window.openFullscreen = () => {
            document.getElementById('fullscreenImage').src = images[currentImageIndex];
            document.getElementById('fullscreenCounter').textContent = `${currentImageIndex+1}/${images.length}`;
            document.getElementById('fullscreenGallery').classList.add('active');
            document.body.style.overflow = 'hidden';
        };
        window.closeFullscreen = () => {
            document.getElementById('fullscreenGallery').classList.remove('active');
            document.body.style.overflow = '';
        };
        window.fullscreenChangeImage = (d) => {
            let i = currentImageIndex + d;
            if (i < 0) i = images.length - 1;
            if (i >= images.length) i = 0;
            currentImageIndex = i;
            document.getElementById('fullscreenImage').src = images[i];
            document.getElementById('fullscreenCounter').textContent = `${i+1}/${images.length}`;
            setImage(i);
        };
        window.toggleFullscreenZoom = () => {
            document.getElementById('fullscreenImage').classList.toggle('zoomed');
        };

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
            });
        });

        document.getElementById('cartBtn').onclick = () => alert('🛒 Корзина в разработке');
        document.getElementById('adminBtn').onclick = () => window.location.href = 'admin-panel.html';

        loadData();
    </script>
</body>
</html>
