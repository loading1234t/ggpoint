<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GGPoint – Отслеживание заказа</title>
    <meta name="description" content="Отслеживание заказа GGPoint. Введите трек-номер или телефон.">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .tracking-card {
            max-width: 650px;
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 28px;
            border: 1px solid rgba(37, 99, 235, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .logo a {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .tracking-icon { text-align: center; font-size: 60px; margin: 20px 0; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(37,99,235,0.15);
            padding: 6px 18px;
            border-radius: 100px;
            margin-bottom: 20px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        .main-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 20px;
        }
        .tracking-form {
            background: rgba(30,41,59,0.5);
            border-radius: 40px;
            padding: 20px;
            margin: 20px 0;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .track-input {
            flex: 1;
            padding: 16px 20px;
            background: rgba(15,23,42,0.9);
            border: 1px solid rgba(37,99,235,0.5);
            border-radius: 60px;
            font-size: 1rem;
            color: #e2e8f0;
            text-align: center;
            outline: none;
        }
        .track-input:focus { border-color: #2563eb; }
        .track-btn {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border: none;
            padding: 0 28px;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .track-hint {
            font-size: 0.7rem;
            color: #7e8aa8;
            text-align: center;
            margin-top: 12px;
        }
        .result-card {
            background: rgba(0,0,0,0.4);
            border-radius: 32px;
            padding: 24px;
            margin-top: 20px;
            border-left: 4px solid #f59e0b;
        }
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }
        .order-item {
            background: rgba(30,41,59,0.5);
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(37,99,235,0.3);
        }
        .order-item:hover {
            border-color: #2563eb;
            transform: translateX(5px);
        }
        .status-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fbbf24;
            margin-bottom: 12px;
        }
        .progress-bar-container {
            background: rgba(30,41,59,0.8);
            border-radius: 100px;
            height: 8px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            border-radius: 100px;
            transition: width 0.5s ease;
        }
        .steps {
            display: flex;
            justify-content: space-between;
            margin: 16px 0;
        }
        .step {
            text-align: center;
            flex: 1;
        }
        .step-circle {
            width: 32px;
            height: 32px;
            background: rgba(30,41,59,0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
            font-size: 0.8rem;
            color: #64748b;
        }
        .step.active .step-circle {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #0f172a;
        }
        .step-name { font-size: 0.6rem; color: #94a3b8; }
        .step.active .step-name { color: #fbbf24; }
        .error-message {
            color: #f87171;
            background: rgba(239,68,68,0.1);
            padding: 20px;
            border-radius: 28px;
            text-align: center;
        }
        .footer-note {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.7rem;
        }
        .footer-note a { color: #60a5fa; text-decoration: none; }
        @media (max-width: 550px) {
            .tracking-card { padding: 24px 16px; }
            .main-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="tracking-card">
    <div class="logo" style="text-align: center;"><a href="index.html">GGPoint</a></div>
    <div class="tracking-icon"><i class="fa-solid fa-boxes-packing"></i></div>
    <div style="text-align: center;"><div class="status-badge"><span class="status-dot"></span><span>ТРЕКИНГ ЗАКАЗОВ</span></div></div>
    <h1 class="main-title">Отслеживание заказа</h1>
    
    <div class="tracking-form">
        <div class="input-group">
            <input type="text" id="trackingInput" class="track-input" placeholder="Трек-номер или номер телефона" autocomplete="off">
            <button id="trackBtn" class="track-btn"><i class="fa-solid fa-search"></i> Найти</button>
        </div>
        <div class="track-hint"><i class="fa-regular fa-circle-info"></i> Введите трек-номер (GG...) или номер телефона (+998...)</div>
    </div>
    
    <div id="resultContainer"></div>
    
    <div class="footer-note">
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="contacts.html">Поддержка</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js';
    import { getDatabase, ref, onValue, get, query, orderByChild, equalTo } from 'https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js';

    const firebaseConfig = {
        apiKey: "AIzaSyDcyOWAF7TA8h8P36Sk5EbDPzA9sEFuTXo",
        authDomain: "ggpoint-shop.firebaseapp.com",
        databaseURL: "https://ggpoint-shop-default-rtdb.firebaseio.com",
        projectId: "ggpoint-shop",
        storageBucket: "ggpoint-shop.firebasestorage.app",
        messagingSenderId: "182227173652",
        appId: "1:182227173652:web:0949e2edae9900afd98201"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // ========== ЖЁСТКИЙ СЦЕНАРИЙ СТАТУСОВ ==========
    function getOrderStatus(sendDate, deliveryType, isClosed) {
        if (isClosed) {
            return {
                text: "✅ Спасибо, что выбрали нас! Ждём вас снова ❤️",
                progress: 100,
                step: "completed"
            };
        }
        
        const today = new Date();
        const send = new Date(sendDate);
        const days = Math.floor((today - send) / (1000 * 60 * 60 * 24));
        
        // Авиа доставка
        if (deliveryType === 'air') {
            if (days <= 1) {
                return { text: "📦 Заказ принят", progress: 15, step: "warehouse" };
            } else if (days <= 3) {
                return { text: "✈️ Отправлен авиа", progress: 40, step: "air" };
            } else if (days <= 5) {
                return { text: "🛃 Таможня Узбекистана", progress: 70, step: "customs" };
            } else {
                return { text: "📬 Сортировка на почте, скоро будет у вас", progress: 90, step: "delivery" };
            }
        }
        
        // Наземная доставка
        if (days <= 2) {
            return { text: "📦 Заказ принят, готовится к отправке", progress: 10, step: "warehouse" };
        } else if (days <= 5) {
            return { text: "🚚 Отправлен, вышел в путь", progress: 25, step: "transit" };
        } else if (days <= 9) {
            return { text: "🚛 В пути", progress: 45, step: "transit" };
        } else if (days <= 13) {
            return { text: "🛃 Таможня Казахстана / Хоргос", progress: 60, step: "customs" };
        } else if (days <= 16) {
            return { text: "🛃 Таможня Узбекистана", progress: 75, step: "customs" };
        } else {
            return { text: "📬 Сортировка на почте, скоро будет у вас", progress: 90, step: "delivery" };
        }
    }

    function renderStatusCard(order, status) {
        const deliveryTypeName = order.deliveryType === 'air' ? '✈️ Авиадоставка' : '🚛 Наземная доставка';
        const sendDateFormatted = new Date(order.sendDate).toLocaleDateString('ru-RU');
        
        return `
            <div class="result-card">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 12px;">
                    <span style="font-family: monospace; background: #1e293b; padding: 4px 12px; border-radius: 40px;">${order.tracking}</span>
                    <span style="background: rgba(56,189,248,0.15); padding: 4px 12px; border-radius: 40px; font-size: 0.8rem;">${deliveryTypeName}</span>
                </div>
                
                <div class="status-title">
                    <i class="fa-regular fa-clock"></i> ${status.text}
                </div>
                
                <div class="progress-bar-container">
                    <div class="progress-fill" style="width: ${status.progress}%;"></div>
                </div>
                
                <div class="steps">
                    <div class="step ${status.step === 'warehouse' ? 'active' : ''}">
                        <div class="step-circle"><i class="fa-solid fa-box"></i></div>
                        <div class="step-name">Склад</div>
                    </div>
                    <div class="step ${status.step === 'air' || status.step === 'transit' ? 'active' : ''}">
                        <div class="step-circle"><i class="fa-solid fa-${order.deliveryType === 'air' ? 'plane' : 'truck'}"></i></div>
                        <div class="step-name">${order.deliveryType === 'air' ? 'Авиа' : 'В пути'}</div>
                    </div>
                    <div class="step ${status.step === 'customs' ? 'active' : ''}">
                        <div class="step-circle"><i class="fa-solid fa-passport"></i></div>
                        <div class="step-name">Таможня</div>
                    </div>
                    <div class="step ${status.step === 'delivery' || status.step === 'completed' ? 'active' : ''}">
                        <div class="step-circle"><i class="fa-solid fa-truck"></i></div>
                        <div class="step-name">Доставка</div>
                    </div>
                </div>
                
                <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: #5b6e8c; margin-top: 12px;">
                    <span><i class="fa-regular fa-calendar"></i> Отправлен: ${sendDateFormatted}</span>
                    <span><i class="fa-regular fa-bell"></i> Обновлено сегодня</span>
                </div>
            </div>
        `;
    }

    function renderOrdersList(orders) {
        if (orders.length === 0) {
            return `<div class="error-message"><i class="fa-regular fa-face-frown"></i> Заказов не найдено</div>`;
        }
        
        return `
            <div class="result-card">
                <div style="font-weight: 600; margin-bottom: 16px;">📦 Найдено заказов: ${orders.length}</div>
                <div class="order-list">
                    ${orders.map(order => {
                        const status = getOrderStatus(order.sendDate, order.deliveryType, order.isClosed || false);
                        return `
                            <div class="order-item" onclick="document.getElementById('trackingInput').value='${order.tracking}'; document.getElementById('trackBtn').click();">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <span style="font-family: monospace; font-weight: bold;">${order.tracking}</span>
                                    <span style="font-size: 0.7rem; color: #fbbf24;">${status.text.substring(0, 30)}...</span>
                                </div>
                                <div style="font-size: 0.7rem; color: #7e8aa8; margin-top: 6px;">
                                    <i class="fa-regular fa-calendar"></i> ${new Date(order.sendDate).toLocaleDateString('ru-RU')}
                                    ${order.deliveryType === 'air' ? ' ✈️ Авиа' : ' 🚛 Наземный'}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `;
    }

    // Поиск по треку (прямой доступ)
    async function searchByTracking(tracking) {
        const orderRef = ref(database, `tracking_orders/${tracking}`);
        const snapshot = await get(orderRef);
        if (snapshot.exists()) {
            const order = { tracking, ...snapshot.val() };
            const status = getOrderStatus(order.sendDate, order.deliveryType, order.isClosed || false);
            return { type: 'single', order, status };
        }
        return null;
    }

    // Поиск по телефону (все заказы)
    async function searchByPhone(phone) {
        const ordersRef = ref(database, 'tracking_orders');
        const snapshot = await get(ordersRef);
        if (snapshot.exists()) {
            const allOrders = snapshot.val();
            const foundOrders = [];
            for (const [tracking, data] of Object.entries(allOrders)) {
                if (data.phone === phone) {
                    foundOrders.push({ tracking, ...data });
                }
            }
            if (foundOrders.length > 0) {
                return { type: 'list', orders: foundOrders };
            }
        }
        return null;
    }

    async function handleSearch() {
        const input = document.getElementById('trackingInput');
        let query = input.value.trim();
        const container = document.getElementById('resultContainer');
        
        if (!query) {
            container.innerHTML = `<div class="error-message"><i class="fa-regular fa-keyboard"></i> Введите трек-номер или телефон</div>`;
            return;
        }
        
        container.innerHTML = `<div style="text-align: center; padding: 40px;"><i class="fa-solid fa-spinner fa-spin"></i> Поиск...</div>`;
        
        // Пробуем как трек
        let result = await searchByTracking(query);
        if (result) {
            container.innerHTML = renderStatusCard(result.order, result.status);
            return;
        }
        
        // Пробуем как телефон
        result = await searchByPhone(query);
        if (result) {
            container.innerHTML = renderOrdersList(result.orders);
            return;
        }
        
        container.innerHTML = `<div class="error-message"><i class="fa-regular fa-circle-xmark"></i> Заказ не найден. Проверьте трек-номер или телефон.</div>`;
    }

    document.getElementById('trackBtn').addEventListener('click', handleSearch);
    document.getElementById('trackingInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSearch();
    });
</script>
</body>
</html>
